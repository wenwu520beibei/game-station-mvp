<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Clone - Play Free Online</title>
    <meta name="description" content="Play Wordle Clone free online. Daily word guessing game. Guess the word in 6 tries!">
    <meta name="keywords" content="wordle, wordle clone, word game, daily puzzle, word guessing game">
    <link rel="canonical" href="https://your-domain.pages.dev/wordle.html">
    <style>
        body { background: #121213; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        header { width: 100%; padding: 1rem; border-bottom: 1px solid #3a3a3c; text-align: center; }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 0.1em; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 1rem; }
        .board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 1rem; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 52px; height: 52px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        .tile.active { border-color: #818384; }
        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
        .keyboard { display: flex; flex-direction: column; gap: 8px; }
        .key-row { display: flex; gap: 6px; justify-content: center; }
        .key { padding: 0 10px; height: 50px; border-radius: 4px; background: #818384; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 35px; }
        .key.wide { flex: 1.5; }
        .message { position: fixed; top: 10%; background: white; color: black; padding: 1rem 2rem; border-radius: 8px; font-weight: bold; display: none; z-index: 100; }
        .back { position: fixed; top: 1rem; left: 1rem; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>WORDLE CLONE</h1>
    </header>
    <a href="/" class="back">← Back to Games</a>
    <div class="message" id="message"></div>
    <div class="container">
        <div class="board" id="board"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>
    
    <script>
        const WORDS = ['APPLE', 'BEACH', 'CRANE', 'DREAM', 'EAGLE', 'FLAME', 'GRAPE', 'HEART', 'LIGHT', 'MUSIC'];
        const target = WORDS[Math.floor(Math.random() * WORDS.length)];
        let current = 0;
        let guesses = ['', '', '', '', '', ''];
        
        // Initialize board
        const board = document.getElementById('board');
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }
        
        // Keyboard
        const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
        const keyboard = document.getElementById('keyboard');
        rows.forEach(row => {
            const div = document.createElement('div');
            div.className = 'key-row';
            row.split('').forEach(k => {
                const key = document.createElement('div');
                key.className = 'key';
                key.textContent = k;
                key.onclick = () => handleKey(k);
                div.appendChild(key);
            });
            keyboard.appendChild(div);
        });
        
        // Add Enter and Backspace
        const lastRow = keyboard.lastChild;
        const enterKey = document.createElement('div');
        enterKey.className = 'key wide';
        enterKey.textContent = 'ENTER';
        enterKey.onclick = submit;
        lastRow.insertBefore(enterKey, lastRow.firstChild);
        
        const bsKey = document.createElement('div');
        bsKey.className = 'key wide';
        bsKey.textContent = '⌫';
        bsKey.onclick = () => { guesses[current] = guesses[current].slice(0, -1); updateBoard(); };
        lastRow.appendChild(bsKey);
        
        function handleKey(k) {
            if (current >= 6) return;
            if (guesses[current].length < 5) {
                guesses[current] += k;
                updateBoard();
            }
        }
        
        function updateBoard() {
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${current}-${i}`);
                tile.textContent = guesses[current][i] || '';
                tile.classList.toggle('active', !!guesses[current][i]);
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') submit();
            else if (e.key === 'Backspace') guesses[current] = guesses[current].slice(0, -1);
            else if (/^[A-Z]$/.test(e.key)) handleKey(e.key);
            updateBoard();
        });
        
        function submit() {
            const guess = guesses[current];
            if (!guess || guess.length !== 5) return;
            
            const result = [];
            const targetArr = target.split('');
            for (let i = 0; i < 5; i++) {
                if (guess[i] === target[i]) result[i] = 'correct';
                else if (target.includes(guess[i])) result[i] = 'present';
                else result[i] = 'absent';
            }
            
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${current}-${i}`);
                setTimeout(() => {
                    tile.classList.add(result[i]);
                    tile.classList.remove('active');
                }, i * 100);
            }
            
            setTimeout(() => {
                if (guess === target) showMessage('🎉 You Won! The word was ' + target);
                else if (current >= 5) showMessage('Game Over! The word was ' + target);
                else current++;
            }, 600);
        }
        
        function showMessage(msg) {
            const m = document.getElementById('message');
            m.textContent = msg;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
